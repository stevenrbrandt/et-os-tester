# Arch Linux (rolling release, GCC 14+)
# Based on generic.cfg with GCC 14 compatibility fixes.

VERSION = 2024-01-01

CPP = cpp
CC  = gcc
CXX = g++

FPP = cpp
F90 = gfortran

FPPFLAGS = -traditional
# GCC 14+ made -Wincompatible-pointer-types a hard error (silo_hdf5.c).
# HDF5 1.14 removed the HD* compatibility macros that H5FDsilo.c still uses
# (HDmemcmp, HDmemset, HDassert, HDopen, HDread, HDwrite, HDstat, HDfstat,
# HDftruncate, HDlseek).  Define them back to their standard equivalents so
# the compiler never emits an undefined symbol for them.
CFLAGS   = -g -std=gnu99 -Wno-error=incompatible-pointer-types \
           -DHDmemcmp=memcmp -DHDmemset=memset -DHDassert=assert \
           -DHDopen=open -DHDread=read -DHDwrite=write \
           -DHDstat=stat -DHDfstat=fstat \
           -DHDftruncate=ftruncate -DHDlseek=lseek
CXXFLAGS = -g -std=c++17 -D_GNU_SOURCE
F90FLAGS = -g -fcray-pointer -ffixed-line-length-none

LDFLAGS = -rdynamic

DEBUG           = no
CPP_DEBUG_FLAGS =
C_DEBUG_FLAGS   =
CXX_DEBUG_FLAGS =

OPTIMISE           = yes
CPP_OPTIMISE_FLAGS =
C_OPTIMISE_FLAGS   = -O2
CXX_OPTIMISE_FLAGS = -O2
F90_OPTIMISE_FLAGS = -O2

PROFILE           = no
CPP_PROFILE_FLAGS =
C_PROFILE_FLAGS   = -pg
CXX_PROFILE_FLAGS = -pg
F90_PROFILE_FLAGS = -pg

WARN           = yes
CPP_WARN_FLAGS = -Wall
C_WARN_FLAGS   = -Wall
CXX_WARN_FLAGS = -Wall
F90_WARN_FLAGS = -Wall

OPENMP           = yes
CPP_OPENMP_FLAGS = -fopenmp
FPP_OPENMP_FLAGS = -D_OPENMP
C_OPENMP_FLAGS   = -fopenmp
CXX_OPENMP_FLAGS = -fopenmp
F90_OPENMP_FLAGS = -fopenmp
LD_OPENMP_FLAGS  = -fopenmp

DISABLE_INT16=yes
DISABLE_REAL16=yes

VECTORISE                = yes
VECTORISE_ALIGNED_ARRAYS = no
VECTORISE_INLINE         = yes

AMREX_ENABLE_CUDA = no

PTHREADS_DIR = NO_BUILD
