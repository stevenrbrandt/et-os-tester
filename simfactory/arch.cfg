# Arch Linux (rolling release, GCC 14+)
# Based on generic.cfg with GCC 14 compatibility fixes.

VERSION = 2024-01-01

CPP = cpp
CC  = gcc
CXX = g++

FPP = cpp
F90 = gfortran

FPPFLAGS = -traditional
# GCC 14+ made several C diagnostics hard errors; downgrade them to warnings
# so Silo's silo_hdf5.c (incompatible pointer types) and H5FDsilo.c (implicit
# function declarations for removed HDF5 HD* macros) build cleanly.
CFLAGS   = -g -std=gnu99 -Wno-error=incompatible-pointer-types -Wno-implicit-function-declaration
CXXFLAGS = -g -std=c++17 -D_GNU_SOURCE
F90FLAGS = -g -fcray-pointer -ffixed-line-length-none

LDFLAGS = -rdynamic

DEBUG           = no
CPP_DEBUG_FLAGS =
C_DEBUG_FLAGS   =
CXX_DEBUG_FLAGS =

OPTIMISE           = yes
CPP_OPTIMISE_FLAGS =
C_OPTIMISE_FLAGS   = -O2
CXX_OPTIMISE_FLAGS = -O2
F90_OPTIMISE_FLAGS = -O2

PROFILE           = no
CPP_PROFILE_FLAGS =
C_PROFILE_FLAGS   = -pg
CXX_PROFILE_FLAGS = -pg
F90_PROFILE_FLAGS = -pg

WARN           = yes
CPP_WARN_FLAGS = -Wall
C_WARN_FLAGS   = -Wall
CXX_WARN_FLAGS = -Wall
F90_WARN_FLAGS = -Wall

OPENMP           = yes
CPP_OPENMP_FLAGS = -fopenmp
FPP_OPENMP_FLAGS = -D_OPENMP
C_OPENMP_FLAGS   = -fopenmp
CXX_OPENMP_FLAGS = -fopenmp
F90_OPENMP_FLAGS = -fopenmp
LD_OPENMP_FLAGS  = -fopenmp

DISABLE_INT16=yes
DISABLE_REAL16=yes

VECTORISE                = yes
VECTORISE_ALIGNED_ARRAYS = no
VECTORISE_INLINE         = yes

AMREX_ENABLE_CUDA = no

PTHREADS_DIR = NO_BUILD
