
[MacOS]

# Machine description
nickname        = MacOS
name            = MacOS
location        = GitHub Actions macOS-14 (Apple Silicon)
description     = macOS Apple Silicon runner with Homebrew gcc@14 and open-mpi
status          = personal

# Access / identification
hostname        = MacOS
aliaspattern    = ^MacOS$

envsetup = <<EOF
export LIBRARY_PATH="${LIBRARY_PATH+$LIBRARY_PATH:}/opt/homebrew/lib:/usr/local/lib"
export CPATH="${CPATH+$CPATH:}/opt/homebrew/include:/usr/local/include"
EOF

# Source tree management
sourcebasedir   = /Users/runner
optionlist      = MacOS.cfg
submitscript    = generic.sub
runscript       = generic.run
make            = make -j@MAKEJOBS@
basedir         = /Users/runner/simulations
ppn             = 3
max-num-threads = 3
num-threads     = 1
nodes           = 1
submit          = exec nohup @SCRIPTFILE@ < /dev/null > @RUNDIR@/@SIMULATION_NAME@.out 2> @RUNDIR@/@SIMULATION_NAME@.err & echo $!
getstatus       = ps @JOB_ID@

stop            = pkill -g $(ps -o pgid= -p @JOB_ID@)
submitpattern   = (.*)
statuspattern   = "^ *@JOB_ID@ "
queuedpattern   = $^
runningpattern  = ^
holdingpattern  = $^
exechost        = echo localhost
exechostpattern = (.*)
stdout          = cat @SIMULATION_NAME@.out
stderr          = cat @SIMULATION_NAME@.err
stdout-follow   = tail -n 100 -f @SIMULATION_NAME@.out @SIMULATION_NAME@.err
