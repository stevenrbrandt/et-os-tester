# MacOS (Apple Silicon / Apple Clang + Homebrew gfortran-16)
# C/C++ use Apple Clang — avoids GCC 14/16 ICEs triggered by
# #pragma GCC reset_options in ET_BHaHAHA on aarch64.
# Fortran still uses Homebrew gfortran-16 (Clang has no mature Fortran frontend).
# cpp-16 (GCC's preprocessor) is used for both CPP and FPP because it
# handles ## token-pasting correctly, unlike Apple's clang -E.

# Whenever this version string changes, the application is configured
# and rebuilt from scratch
VERSION = 2024-01-03

CPP = cpp-16
CC  = clang
CXX = clang++

FPP = cpp-16
F90 = gfortran-16

FPPFLAGS = -traditional
# use gnu99 and not c99 since FFTW3 relies on gcc's "asm" function
CFLAGS   = -g -std=gnu99
CXXFLAGS = -g -std=c++17 -D_GNU_SOURCE
F90FLAGS = -g -fcray-pointer -ffixed-line-length-none

# macOS linker does not support -rdynamic; use Homebrew lib path instead
LDFLAGS = -L/opt/homebrew/lib

DEBUG           = no
CPP_DEBUG_FLAGS =
C_DEBUG_FLAGS   =
CXX_DEBUG_FLAGS =

OPTIMISE           = yes
CPP_OPTIMISE_FLAGS =
C_OPTIMISE_FLAGS   = -O2
CXX_OPTIMISE_FLAGS = -O2
F90_OPTIMISE_FLAGS = -O2

PROFILE           = no
CPP_PROFILE_FLAGS =
C_PROFILE_FLAGS   = -pg
CXX_PROFILE_FLAGS = -pg
F90_PROFILE_FLAGS = -pg

WARN           = yes
CPP_WARN_FLAGS = -Wall
C_WARN_FLAGS   = -Wall
CXX_WARN_FLAGS = -Wall
F90_WARN_FLAGS = -Wall

OPENMP           = no
CPP_OPENMP_FLAGS =
FPP_OPENMP_FLAGS =
C_OPENMP_FLAGS   =
CXX_OPENMP_FLAGS =
F90_OPENMP_FLAGS =
LD_OPENMP_FLAGS  =

VECTORISE                = yes
VECTORISE_ALIGNED_ARRAYS = no
VECTORISE_INLINE         = yes

# Homebrew package locations (Apple Silicon: /opt/homebrew)
HDF5_DIR    = /opt/homebrew/opt/hdf5
GSL_DIR     = /opt/homebrew/opt/gsl
FFTW3_DIR   = /opt/homebrew/opt/fftw
OPENSSL_DIR = /opt/homebrew/opt/openssl@3
MPI_DIR     = /opt/homebrew/opt/open-mpi

PTHREADS_DIR = NO_BUILD
